proxies:
  - name: "YourProxy"
    type: http
    server: 144.48.108.121
    port: 5452
  - name: "nice"
    type: http
    server: 144.48.108.122
    port: 5452
proxy-groups:
  - name: "FREE"
    type: load-balance
    strategy: round-robin
    proxies:
      - "YourProxy"
      - "nice"
    url: "http://www.gstatic.com/generate_204" # Required for load-balance/health checks
    interval: 10

rules:
  - MATCH,FREE
